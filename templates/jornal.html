<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jornal CRESM - Retrospectiva 2025</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Índice lateral das edições -->
    <div class="edicoes-sidebar" id="edicoesSidebar">
        <div class="sidebar-header">
            <h3>Edições</h3>
        </div>
        <div class="edicoes-list" id="edicoesList">
            <!-- Será preenchido dinamicamente via JavaScript -->
        </div>
    </div>

    <!-- Botão para abrir revista -->
    <a href="{{ url_for('main.revista') }}" class="btn-revista">
        <i class="fas fa-book"></i>
        <span>Ler como Revista</span>
    </a>

    <!-- Container principal com Bootstrap -->
    <div class="container-fluid p-0 m-0 jornal-container" id="jornalContainer">
        <div class="row g-0 m-0 p-0 h-100">
            <div class="col-12 p-0 m-0">
                <img src="{{ url_for('static', filename='imagens/capa.jpeg') }}" alt="Capa Jornal CRESM" class="img-fluid w-100 d-block jornal-img">
            </div>
        </div>
    </div>

    <style>
        /* Reset completo */
        * {
            margin: 0;
            padding: 0;
            border: 0;
        }

        html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            overflow: hidden;
        }

        body {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            border: 0;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        /* Sidebar de edições */
        .edicoes-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #000;
            padding: 20px 0;
            z-index: 99;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0 20px 20px 20px;
            border-bottom: 2px solid rgba(0, 196, 255, 0.3);
            margin-bottom: 20px;
        }

        .sidebar-header h3 {
            color: #00c4ff;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
        }

        .edicoes-list {
            display: flex;
            flex-direction: column;
        }

        .edicao-item {
            padding: 15px 20px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            font-weight: 500;
        }

        .edicao-item:hover {
            background: rgba(0, 196, 255, 0.15);
            color: #00c4ff;
            padding-left: 25px;
        }

        .edicao-item.active {
            background: rgba(0, 196, 255, 0.25);
            color: #00c4ff;
            border-left-color: #00c4ff;
            font-weight: 700;
        }

        .btn-revista {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #1b5e3c 0%, #00c4ff 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(0, 196, 255, 0.4);
            font-size: 1rem;
        }

        .btn-revista:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(0, 196, 255, 0.6);
            color: white;
        }

        .btn-revista i {
            font-size: 1.2rem;
        }

        .jornal-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
            margin-left: 250px;
            transition: margin-left 0.3s ease;
        }

        .jornal-container.sidebar-closed {
            margin-left: 0;
        }

        .row {
            width: 100%;
            height: 100%;
        }

        .col-12 {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .jornal-img {
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            display: block;
        }

        /* Remover paddings/margins padrão do Bootstrap */
        .container-fluid {
            --bs-gutter-x: 0;
            --bs-gutter-y: 0;
        }

        /* Media queries */
        @media (min-width: 1200px) {
            .jornal-img {
                width: auto;
                height: 100vh;
                object-fit: contain;
            }
        }

        @media (max-width: 1199px) and (min-width: 768px) {
            .jornal-img {
                width: 100%;
                height: auto;
                object-fit: contain;
            }

            .jornal-container {
                margin-left: 200px;
            }

            .edicoes-sidebar {
                width: 200px;
            }

            .jornal-container.sidebar-closed {
                margin-left: 0;
            }
        }

        @media (max-width: 767px) {
            .btn-revista {
                padding: 12px 20px;
                font-size: 0.9rem;
                bottom: 20px;
                right: 20px;
            }

            .btn-revista i {
                font-size: 1rem;
            }

            .jornal-img {
                width: 100%;
                height: auto;
                object-fit: contain;
            }

            .jornal-container {
                margin-left: 180px;
            }

            .edicoes-sidebar {
                width: 180px;
            }

            .sidebar-header h3 {
                font-size: 1.1rem;
            }

            .edicao-item {
                padding: 12px 15px;
                font-size: 0.95rem;
            }

            .jornal-container.sidebar-closed {
                margin-left: 0;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let edicaoAtual = 'janeiro';

        // Carregar edições disponíveis
        async function carregarEdicoes() {
            try {
                const response = await fetch('/api/carregar-edicoes');
                const data = await response.json();
                
                if (data.success) {
                    renderizarEdicoes(data.edicoes);
                } else {
                    console.error('Erro ao carregar edições:', data.error);
                }
            } catch (error) {
                console.error('Erro ao carregar edições:', error);
            }
        }

        // Renderizar edições no sidebar
        function renderizarEdicoes(edicoes) {
            const edicoesList = document.getElementById('edicoesList');
            edicoesList.innerHTML = '';

            edicoes.forEach(edicao => {
                const edicaoDiv = document.createElement('div');
                edicaoDiv.className = 'edicao-item';
                if (edicao.id === edicaoAtual) {
                    edicaoDiv.classList.add('active');
                }
                edicaoDiv.textContent = edicao.nome;
                edicaoDiv.onclick = () => selecionarEdicao(edicao.id, edicaoDiv);
                edicoesList.appendChild(edicaoDiv);
            });
        }

        // Selecionar uma edição
        function selecionarEdicao(edicaoId, elemento) {
            // Remover active de todos
            document.querySelectorAll('.edicao-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Adicionar active ao clicado
            elemento.classList.add('active');
            edicaoAtual = edicaoId;
            
            // Navegar para revista com edição selecionada
            window.location.href = `{{ url_for('main.revista') }}?edicao=${edicaoId}`;
        }

        // Controle do sidebar removido - sempre visível
        
        // Carregar edições ao inicializar
        carregarEdicoes();
    </script>
</body>
</html>
