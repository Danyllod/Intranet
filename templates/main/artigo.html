{% extends "base.html" %}

{% block title %}{{ artigo.titulo }} - Conexão CRESM{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-lg-8">
            <h1 class="mb-3">{{ artigo.titulo }}</h1>
            <div class="article-meta text-muted small mb-4">
                <span><i class="fas fa-user"></i> {{ artigo.autor }}</span> | 
                <span><i class="fas fa-calendar"></i> {{ artigo.data }}</span> | 
                <span><i class="fas fa-eye"></i> {{ artigo.views }} visualizações</span>
            </div>
            <img src="https://via.placeholder.com/800x400?text=Artigo+{{ artigo.id }}" alt="{{ artigo.titulo }}" class="img-fluid rounded-4 mb-5" style="height: 400px; object-fit: cover;">
            
            <div class="article-content">
                <p class="lead">{{ artigo.conteudo }}</p>
            </div>
        </div>
        <div class="col-lg-4">
            <!-- Category Widget -->
            <div class="widget card border-0 shadow-sm mb-4">
                <div class="card-header bg-cresm-dark text-white">
                    <h5 class="mb-0"><i class="fas fa-tag"></i> Categoria</h5>
                </div>
                <div class="card-body">
                    <p><strong>{{ artigo.categoria }}</strong></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
